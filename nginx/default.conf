server {
    listen 80;
    server_name nassoo.online www.nassoo.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nassoo.online www.nassoo.online;

    ssl_certificate /etc/letsencrypt/live/nassoo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nassoo.online/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
        try_files $uri $uri/ =404;
    }

    location / {
        # Docker DNS (127.0.0.11); variable proxy_pass forces re-resolve when web is recreated
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $django_upstream web;
        proxy_pass http://$django_upstream:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}