name: Deploy to Azure VM

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: backendapp.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        docker build -t backendapp.azurecr.io/backendapp:${{ github.sha }} \
                    -t backendapp.azurecr.io/backendapp:latest .
        docker push backendapp.azurecr.io/backendapp:${{ github.sha }}
        docker push backendapp.azurecr.io/backendapp:latest

    - name: Deploy to VM via SSH
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.VM_IP }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script_stop: true
        script: |
          set -e
          DEPLOY_DIR=/opt/django-docker-app
          cd "$DEPLOY_DIR"
          sudo git -C "$DEPLOY_DIR" -c safe.directory="$DEPLOY_DIR" fetch --no-tags --depth=1 \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            "+refs/heads/${{ github.ref_name }}:refs/remotes/origin/${{ github.ref_name }}"
          sudo git -C "$DEPLOY_DIR" checkout -f "${{ github.ref_name }}"
          sudo git -C "$DEPLOY_DIR" reset --hard "origin/${{ github.ref_name }}"
          echo "${{ secrets.ACR_PASSWORD }}" | sudo docker login backendapp.azurecr.io \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin
          sudo env IMAGE_TAG=${{ github.sha }} docker compose pull web
          sudo docker rm -f django_app || true
          sudo env IMAGE_TAG=${{ github.sha }} docker compose up -d --force-recreate --no-deps web
          # restart alone fails if nginx was never created; up -d creates/starts it, then restart reloads config + upstream
          sudo docker compose up -d --no-deps nginx
          sudo docker compose restart nginx
          sudo docker image prune -f
