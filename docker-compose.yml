version: '3.9'

services:
  web:
    build: .
    container_name: django_app
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles   # ✅ shared volume
    ports:
      - "8000:8000"

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - static_volume:/app/staticfiles   # ✅ same shared volume
    depends_on:
      - web

volumes:
  static_volume:   # ✅ declare it here