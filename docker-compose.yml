name: myapp

services:
  web:
    image: backendapp.azurecr.io/backendapp:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: django_app
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
    expose:
      - "8000"

